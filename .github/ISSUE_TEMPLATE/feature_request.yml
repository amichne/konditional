name: Feature request
description: Propose a new capability or improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an improvement.
        Please describe the problem first, then the desired change.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What limitation or pain point are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What API or behavior would you like to see?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you evaluate?
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add references, examples, or migration concerns.
  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues for related proposals.
          required: true
